name: qrpay
description: >
  QRPay Merchant App offers a comprehensive solution for seamless receive money
  using QR codes, catering to Android and iOS platforms. Key features encompass
  effortless receive money through QR codes, a secure payment checkout page,
  versatile payment gateway integration, and an accessible Developer API.
  Welcome to the QRPay Payment Gateway Solutions Developer API Documentation.
  This comprehensive guide will empower you to seamlessly integrate our advanced
  payment gateway into your website, enhancing your customers’ payment experience
  and enabling efficient transaction processing. The QRPay Developer API is
  designed for developers and entrepreneurs who seek simplicity, security, and
  reliability in their payment processing solutions. Our commitment lies in
  delivering exceptional software solutions at a budget-friendly cost, empowering
  you to capitalize on opportunities and excel in this dynamic industry.
  Embrace the opportunity to elevate ordinary operations into extraordinary
  accomplishments with QRPay.

publish_to: "none"

version: 1.5.0+3

environment:
    sdk: ">=3.9.2 <4.0.0"
    flutter: ">=3.38.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.7.3
  get_storage: ^2.1.1

  # UI/UX
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.1
  pin_code_fields: ^8.0.1
  dotted_line: ^3.2.3
  flutter_svg: ^2.2.1

  # Network and Connectivity
  http: 1.5.0
  connectivity_plus: ^7.0.0
  flutter_spinkit: ^5.2.2
  flutter_inappwebview: ^6.1.5
  flutter_html: ^3.0.0
  share_plus: ^12.0.1
  cached_network_image: 

  #Internationalization
  intl: ^0.20.2
  logger: ^2.5.0
  local_auth: ^3.0.0
  country_code_picker: ^3.4.1
  image_picker: ^1.2.0
  dotted_border: ^3.1.0
  iconsax: ^0.0.8
  flutter_staggered_animations: ^1.1.1
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^19.4.2

  firebase_core: ^4.1.0
  pusher_beams: ^1.1.2
  rename_app: ^1.6.3
  restart_app: ^1.3.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  flutter_gen_runner: ^5.11.0

  # Code Quality
  # dart_code_metrics: ^5.7.6
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  http: 1.4.0
flutter_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo/app_launcher.png"

flutter_gen:
  output: lib/custom_assets/ # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)

flutter:
  uses-material-design: true
  fonts:
    - family: AgencyFB-Bold
      fonts:
        - asset: fonts/AgencyFB-Bold.ttf

  assets:
    - assets/clipart/
    - assets/icon/
    - assets/logo/
    - assets/qr/
