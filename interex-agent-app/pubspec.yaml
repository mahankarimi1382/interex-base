name: qrpay
description: "QRPay Pro Agent"
publish_to: "none"

version: 1.5.0+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  get: ^4.7.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  country_code_picker: ^3.4.1
  get_storage: ^2.1.1
  logger: ^2.7.0
  pin_code_fields: ^9.4.0
  intl: ^0.20.2
  image_picker: ^1.2.2
  flutter_svg: ^2.3.0
  qr_code_scanner_plus: ^2.1.2
  dotted_border: ^3.1.0
  carousel_slider: ^5.1.2
  connectivity_plus: ^7.1.1
  http: ^1.6.0
  flutter_inappwebview: ^6.1.5
  flutter_html: ^3.0.0
  share_plus: ^13.1.0
  local_auth: ^3.0.1
  cached_network_image: ^3.3.1
  uuid: ^3.0.5
  flutter_local_notifications: ^21.0.0
  iconsax: ^0.0.8
  flutter_animate: ^4.5.2
  flutter_staggered_animations: ^1.1.1
  qr_flutter: ^4.1.0
  loading_animation_widget: ^1.3.0
  lottie: ^3.3.3
  dropdown_button2: ^3.1.0
  pusher_beams: ^1.1.2
  firebase_core: ^4.10.0
  rename_app: ^1.6.6
  restart_app: ^1.8.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/app_launcher.png"

flutter_gen:
  output: lib/custom_assets/
  line_length: 80

flutter:
  uses-material-design: true

  fonts:
    - family: AgencyFB-Bold
      fonts:
        - asset: fonts/AgencyFB-Bold.ttf

  assets:
    - assets/animation/
    - assets/card/
    - assets/clipart/
    - assets/icon/
    - assets/logo/
    - assets/onboard/
    - assets/qr/
