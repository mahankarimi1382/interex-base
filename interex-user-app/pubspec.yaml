name: qrpaypro
description: "QRPay Pro"
publish_to: "none"
version: 1.5.0+21

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  country_code_picker: ^3.4.1
  get_storage: ^2.1.1
  logger: ^2.7.0
  pin_code_fields: ^9.4.0
  intl: ^0.20.2
  image_picker: ^1.2.2
  dotted_line: ^3.3.0
  flutter_svg: ^2.3.0
  flip_card: ^0.7.0
  dotted_border: ^3.1.0
  carousel_slider: ^5.1.2
  connectivity_plus: ^7.1.1
  flutter_spinkit: ^5.2.2
  smooth_page_indicator: ^2.0.1
  http: ^1.6.0
  flutter_inappwebview: ^6.1.5
  patterns_canvas: ^0.6.0
  flutter_html: ^3.0.0
  share_plus: ^13.1.0
  local_auth: ^3.0.1
  cached_network_image: ^3.3.1
  path_provider: ^2.1.5
  uuid: ^3.0.5
  flutter_local_notifications: ^21.0.0
  iconsax: ^0.0.8
  flutter_animate: ^4.5.2
  flutter_staggered_animations: ^1.1.1
  qr_flutter: ^4.1.0
  liquid_swipe: ^3.1.0
  pusher_beams: ^1.1.2
  firebase_core: ^4.10.0
  flutter_phoenix: ^1.1.1
  restart_app: ^1.8.3
  r_dotted_line_border: ^0.1.1
  shimmer: ^3.0.0
  rename_app: ^1.6.6
  qr_code_scanner_plus: ^2.1.2
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_gen_runner: ^5.14.1

flutter_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo/app_launcher.png"

flutter_gen:
  output: lib/custom_assets/
  line_length: 80

flutter:
  uses-material-design: true

  fonts:
    - family: AgencyFB-Bold
      fonts:
        - asset: fonts/AgencyFB-Bold.ttf

  assets:
    - assets/card/
    - assets/clipart/
    - assets/icon/
    - assets/logo/
    - assets/qr/
