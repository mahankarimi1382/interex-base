name: qrpaypro
description: A new Flutter project.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.5.0+21


environment:
    sdk: ">=3.9.2 <4.0.0"
    flutter: ">=3.38.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  get: 4.7.3
  flutter_screenutil: ^5.9.3
  google_fonts: 6.3.3
  country_code_picker: ^3.4.0
  get_storage: ^2.1.1
  logger: ^2.6.1
  pin_code_fields: 8.0.1
  intl: 0.20.2
  image_picker: ^1.2.0
  dotted_line: 3.2.3
  flutter_svg:
  flip_card: ^0.7.0
  dotted_border: ^3.1.0
  carousel_slider: ^5.0.0
  connectivity_plus: ^7.0.0
  flutter_spinkit: ^5.2.1
  smooth_page_indicator: 2.0.1
  http: ^1.5.0
  flutter_inappwebview: 6.1.5
  patterns_canvas: 0.5.0
  flutter_html:
  share_plus: ^12.0.0
  local_auth: 3.0.0
  cached_network_image:
  path_provider: 2.1.5
  uuid:
  flutter_local_notifications:
  iconsax: ^0.0.8
  flutter_animate: 4.5.2
  flutter_staggered_animations: ^1.1.1
  qr_flutter: ^4.1.0
  liquid_swipe: ^3.1.0
  pusher_beams: 1.1.2
  firebase_core:
  flutter_phoenix: ^1.1.1
  restart_app: 1.3.2
  r_dotted_line_border: ^0.1.1
  shimmer: 3.0.0
  rename_app: ^1.6.5
  qr_code_scanner_plus: 2.0.14
  screenshot:

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_launcher_icons:
  change_app_package_name: 1.5.0
  flutter_lints: ^6.0.0
  build_runner:
  flutter_gen_runner:
  dart_code_metrics:

flutter_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo/app_launcher.png"

flutter_gen:
  output: lib/custom_assets/ # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)

flutter:
  uses-material-design: true

  fonts:
    - family: AgencyFB-Bold
      fonts:
        - asset: fonts/AgencyFB-Bold.ttf

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

  assets:
    - assets/card/
    - assets/clipart/
    - assets/icon/
    - assets/logo/
    - assets/qr/